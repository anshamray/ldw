<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LED-Wand Admin</title>
    <link rel="stylesheet" href="src/output.css">
</head>
<body class="min-h-dvh bg-zinc-950 font-mono text-base text-stone-50">

    <!-- Login Screen -->
    <div class="mx-auto flex min-h-dvh max-w-md flex-col justify-center px-4" id="login-screen">
        <div class="rounded-sm bg-zinc-50 p-5 text-stone-900">
            <h1 class="mb-2 font-doto text-5xl font-bold">LED-Wand</h1>
            <p class="mb-6 text-base/5">Admin-Bereich</p>
            <div class="mb-3 hidden text-sm text-red-600" id="login-error">Falsches Passwort</div>
            <form onsubmit="login(event)">
                <div class="relative mb-3">
                    <input
                        type="password"
                        id="password"
                        class="block w-full border-b border-stone-400 px-1 py-1 text-sm transition-all placeholder:text-base/5 placeholder:text-zinc-400 focus:border-stone-800 focus:outline-0"
                        placeholder="Passwort..."
                        autofocus>
                    <button type="button" onclick="togglePassword()" class="absolute right-1 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-stone-800" tabindex="-1">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg id="eye-off-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </button>
                </div>
                <button
                    type="submit"
                    class="box-border w-full border border-transparent bg-zinc-900 px-3 py-2 leading-5 text-white transition-all hover:bg-indigo-500 hover:shadow-md focus:ring-4 focus:ring-stone-50">
                    Anmelden
                </button>
            </form>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div class="mx-auto hidden max-w-3xl px-4 py-6" id="admin-screen">
        <div class="mb-6 rounded-sm bg-zinc-50 p-5 text-stone-900">
            <div class="flex items-center justify-between">
                <h1 class="font-doto text-3xl font-bold">LED-Wand</h1>
                <button onclick="logout()" class="border border-stone-300 px-3 py-1 text-sm transition-all hover:bg-stone-100">Abmelden</button>
            </div>
            <p class="mt-1 text-sm text-zinc-500">Moderation</p>

            <div class="mt-4 flex gap-4 text-center">
                <div class="flex-1 rounded bg-zinc-100 p-3">
                    <div class="font-doto text-2xl font-bold text-indigo-600" id="pending-count">-</div>
                    <div class="text-xs text-zinc-500">Warteschlange</div>
                </div>
                <div class="flex-1 rounded bg-zinc-100 p-3">
                    <div class="font-doto text-2xl font-bold text-indigo-600" id="displayed-count">-</div>
                    <div class="text-xs text-zinc-500">Angezeigt</div>
                </div>
                <div class="flex-1 rounded bg-zinc-100 p-3">
                    <div class="font-doto text-2xl font-bold text-indigo-600" id="filtered-count">-</div>
                    <div class="text-xs text-zinc-500">Gefiltert</div>
                </div>
            </div>

            <div class="mt-4 flex items-center gap-2">
                <button onclick="loadMessages()" class="border border-stone-300 px-3 py-1 text-sm transition-all hover:bg-stone-100">Aktualisieren</button>
                <button onclick="clearDisplayed()" class="border border-stone-300 px-3 py-1 text-sm transition-all hover:bg-stone-100">Angezeigte löschen</button>
                <span class="ml-auto text-xs text-zinc-400">Auto-Refresh: 5s</span>
            </div>
        </div>

        <div class="mb-4">
            <h2 class="mb-2 font-mono text-sm text-zinc-500">Warteschlange</h2>
            <div class="flex flex-col gap-2" id="pending-messages">
                <div class="rounded-sm bg-zinc-50/5 p-4 text-center text-sm text-zinc-500">Laden...</div>
            </div>
        </div>

        <div class="mb-4">
            <h2 class="mb-2 font-mono text-sm text-zinc-500">Bereits angezeigt</h2>
            <div class="flex flex-col gap-2" id="displayed-messages">
                <div class="rounded-sm bg-zinc-50/5 p-4 text-center text-sm text-zinc-500">Laden...</div>
            </div>
        </div>
    </div>

    <script>
        let authToken = localStorage.getItem('adminToken');
        let autoRefreshInterval;

        function togglePassword() {
            const input = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            const eyeOffIcon = document.getElementById('eye-off-icon');
            if (input.type === 'password') {
                input.type = 'text';
                eyeIcon.classList.add('hidden');
                eyeOffIcon.classList.remove('hidden');
            } else {
                input.type = 'password';
                eyeIcon.classList.remove('hidden');
                eyeOffIcon.classList.add('hidden');
            }
        }

        // Check if already logged in
        if (authToken) {
            showAdminScreen();
        }

        async function login(event) {
            event.preventDefault();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');

            try {
                const response = await fetch('/api/v1/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (data.success) {
                    authToken = data.token;
                    localStorage.setItem('adminToken', authToken);
                    errorEl.classList.add('hidden');
                    showAdminScreen();
                } else {
                    errorEl.classList.remove('hidden');
                    document.getElementById('password').value = '';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorEl.textContent = 'Verbindungsfehler';
                errorEl.classList.remove('hidden');
            }
        }

        function logout() {
            fetch('/api/v1/admin/logout', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${authToken}` }
            });

            authToken = null;
            localStorage.removeItem('adminToken');
            clearInterval(autoRefreshInterval);

            document.getElementById('admin-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('password').value = '';
        }

        function showAdminScreen() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('admin-screen').classList.remove('hidden');
            loadMessages();
            autoRefreshInterval = setInterval(loadMessages, 5000);
        }

        async function loadMessages() {
            try {
                const response = await fetch('/api/v1/admin/messages', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (response.status === 401) {
                    logout();
                    return;
                }

                const data = await response.json();

                document.getElementById('pending-count').textContent = data.status.pendingMessages;
                document.getElementById('displayed-count').textContent = data.status.displayedMessages;
                document.getElementById('filtered-count').textContent = data.status.totalFiltered || 0;

                const pending = data.messages.filter(m => m.status === 'pending');
                const displayed = data.messages.filter(m => m.status === 'displayed');

                renderMessages('pending-messages', pending, true);
                renderMessages('displayed-messages', displayed.reverse(), false);

            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        function renderMessages(containerId, messages, showPosition) {
            const container = document.getElementById(containerId);

            if (messages.length === 0) {
                container.innerHTML = '<div class="rounded-sm bg-zinc-50/5 p-4 text-center text-sm text-zinc-500">Keine Nachrichten</div>';
                return;
            }

            container.innerHTML = messages.map(msg => {
                let statusClass = 'bg-blue-500/20 text-blue-300';
                let statusText = 'Angezeigt';

                if (msg.status === 'pending') {
                    if (msg.isReady) {
                        statusClass = 'bg-green-500/20 text-green-300';
                        statusText = 'Bereit';
                    } else {
                        statusClass = 'bg-yellow-500/20 text-yellow-300';
                        statusText = 'Wartet';
                    }
                }

                const countdown = msg.readyInMs > 0 ? `<span class="ml-1 text-yellow-300">(${Math.ceil(msg.readyInMs / 1000)}s)</span>` : '';

                return `
                <div class="flex items-center gap-3 rounded-sm bg-zinc-50/5 p-3 ${msg.status === 'displayed' ? 'opacity-50' : ''}">
                    <div class="flex-1 min-w-0">
                        <div class="text-sm break-words">
                            ${showPosition && msg.queuePosition ? `<span class="mr-1 inline-block rounded bg-indigo-600 px-1.5 py-0.5 text-xs text-white">#${msg.queuePosition}</span>` : ''}
                            ${escapeHtml(msg.text)}
                        </div>
                        <div class="mt-1 text-xs text-zinc-500">
                            ${formatTime(msg.submittedAt)}
                            ${msg.displayedAt ? ` · ${formatTime(msg.displayedAt)}` : ''}
                            ${msg.displayedBy ? ` (${msg.displayedBy})` : ''}
                        </div>
                    </div>
                    <span class="shrink-0 rounded px-2 py-0.5 text-xs uppercase ${statusClass}">
                        ${statusText}${countdown}
                    </span>
                    <button onclick="deleteMessage('${msg.id}')" class="shrink-0 rounded bg-red-900/50 px-2 py-1 text-xs text-red-300 transition-all hover:bg-red-800">Löschen</button>
                </div>
            `}).join('');
        }

        async function deleteMessage(messageId) {
            if (!confirm('Diese Nachricht wirklich löschen?')) return;

            try {
                const response = await fetch(`/api/v1/admin/messages/${messageId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (response.status === 401) {
                    logout();
                    return;
                }

                if (response.ok) {
                    loadMessages();
                } else {
                    alert('Fehler beim Löschen');
                }
            } catch (error) {
                console.error('Error deleting message:', error);
                alert('Fehler beim Löschen');
            }
        }

        async function clearDisplayed() {
            if (!confirm('Alle angezeigten Nachrichten löschen?')) return;

            try {
                const response = await fetch('/api/v1/admin/clear-displayed', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (response.status === 401) {
                    logout();
                    return;
                }

                if (response.ok) {
                    const data = await response.json();
                    alert(`${data.removed} Nachrichten gelöscht`);
                    loadMessages();
                }
            } catch (error) {
                console.error('Error clearing displayed:', error);
            }
        }

        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
